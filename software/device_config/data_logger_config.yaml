# ============================================================
# CONFIGURAÇÃO DE GPIO – OPÇÕES VÁLIDAS
#
# Campos obrigatórios por GPIO:
#   gpio:        Número físico do pino (ex: 1, 2, 33, 34, 35, 37, 38)
#   state:       0 = desabilitado | 1 = habilitado
#   mode:        DISABLE | INPUT | OUTPUT | INPUT_OUTPUT
#   intr:        DISABLE | POSEDGE | NEGEDGE | ANYEDGE | LOW_LEVEL | HIGH_LEVEL
#   pullup:      DISABLE | ENABLE
#   pulldown:    DISABLE | ENABLE
#
# Exemplo:
# gpio:
#   - gpio: 33
#     state: 1
#     mode: INPUT
#     intr: ANYEDGE
#     pullup: ENABLE
#     pulldown: DISABLE
#
# Observações:
# - O número do GPIO é sempre o pino físico.
# - A conversão para enum do firmware é feita automaticamente pelo script.
# - Evite usar o mesmo GPIO como GPIO e UART ao mesmo tempo.
# ============================================================

gpio:
  - gpio: 34
    state: 1
    mode: OUTPUT
    intr: DISABLE
    pullup: DISABLE
    pulldown: DISABLE

  - gpio: 35
    state: 1
    mode: INPUT
    intr: ANYEDGE
    pullup: DISABLE
    pulldown: ENABLE

  - gpio: 36
    state: 1
    mode: OUTPUT
    intr: DISABLE
    pullup: DISABLE
    pulldown: DISABLE

  - gpio: 37
    state: 1
    mode: INPUT
    intr: ANYEDGE
    pullup: DISABLE
    pulldown: ENABLE

uart:
  - uart_num: 0
    state: 0
    rx_gpio: 1
    tx_gpio: 2
    baudrate: 115200

  - uart_num: 1
    state: 0
    rx_gpio: 3
    tx_gpio: 4
    baudrate: 115200

  - uart_num: 2
    state: 0
    rx_gpio: 5
    tx_gpio: 33
    baudrate: 115200
