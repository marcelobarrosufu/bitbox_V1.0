name: Build ESP32 Firmware

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        run: |
          git clone -b master --recursive https://github.com/espressif/esp-idf.git $HOME/esp-idf
          $HOME/esp-idf/install.sh

      - name: Build Project
        working-directory: firmware/fw_bitbox_v1
        run: |
           . $HOME/esp-idf/export.sh
           idf.py build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/fw_bitbox_v1/build/*.bin
