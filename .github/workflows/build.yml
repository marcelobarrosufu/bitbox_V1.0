name: Build Firmware

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # O GitHub vai construir seu Dockerfile e usar como ambiente do job
    container:
      build:
        context: ./firmware/fw_bitbox_v1/.devcontainer
        dockerfile: Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build firmware
        working-directory: firmware/fw_bitbox_v1
        run: |
          idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/fw_bitbox_v1/build/
