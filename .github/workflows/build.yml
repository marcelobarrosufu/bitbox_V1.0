name: Build Firmware

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Build the image from the .devcontainer Dockerfile
      - name: Build devcontainer image
        run: |
          docker build \
            -t esp-idf-devcontainer \
            -f firmware/fw_bitbox_v1/.devcontainer/Dockerfile \
            firmware/fw_bitbox_v1/.devcontainer

      # 2. Run the build inside the container manually
      - name: Run build inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/firmware/fw_bitbox_v1:/project \
            -w /project \
            esp-idf-devcontainer \
            idf.py build

      # 3. Upload artifacts
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/fw_bitbox_v1/build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/*.bin
            build/**/*.bin
            build/*.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

